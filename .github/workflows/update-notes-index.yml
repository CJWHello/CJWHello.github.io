name: Update Notes Index

on:
  push:
    paths:
      - "notes/**/*.md"
      - "scripts/generate_notes_index.py"
      - ".github/workflows/update-notes-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-notes-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate notes index
        run: python scripts/generate_notes_index.py

      - name: Commit updated notes index
        run: |
          if git diff --quiet -- data/notes.json; then
            echo "No notes index changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/notes.json
          git commit -m "chore: update notes index"
          git push

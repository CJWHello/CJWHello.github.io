<body>
  <canvas id="particle-canvas" aria-hidden="true"></canvas>
  <div class="aurora-field" aria-hidden="true"></div>
  <div class="cursor-glow" aria-hidden="true"></div>
  <div class="scroll-progress" aria-hidden="true"></div>

  <header class="site-header is-expanded" data-page-shell>
    <a class="brand" href="./index.html">
      <img class="brand-avatar" src="./assets/my.jpg" alt="恍如昨日头像" loading="eager" />
      <span class="brand-text" data-profile="name">恍如昨日</span>

    <nav class="site-nav" aria-label="Primary navigation">

    <div class="header-actions">
      <button class="icon-button theme-toggle" type="button" aria-label="Toggle color theme" data-theme-toggle>
        <i class="fa-solid fa-moon"></i>
      </button>
      <button class="icon-button menu-toggle" type="button" aria-label="Open navigation" data-menu-toggle>
        <i class="fa-solid fa-bars"></i>
      </button>
    </div>
  </header>

  <main class="page-transition inner-page travel-page">
    <section class="section-shell travel-gallery-section" data-travel-gallery>
      <article class="travel-gallery-card reveal is-visible">
        <div class="travel-gallery-head">
          <p class="eyebrow">Loading</p>
          <h2>正在读取旅行地点</h2>
        </div>
        <div class="travel-slider-shell">
          <button class="travel-slider-button is-prev" type="button" aria-label="上一张">
            <i class="fa-solid fa-chevron-left"></i>
          </button>
          <div class="travel-slider-viewport">
            <div class="travel-slider-track">
              <figure class="travel-slide is-placeholder">
                <img src="./assets/images/project-nexus.svg" alt="加载中" loading="lazy" />
              </figure>
            </div>
          </div>
          <button class="travel-slider-button is-next" type="button" aria-label="下一张">
            <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>
      </article>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-grid">
      <div>
        <a class="brand" href="./index.html">
          <img class="brand-avatar" src="./assets/my.jpg" alt="恍如昨日头像" loading="eager" />

        <a href="./blog.html"><i class="fa-regular fa-note-sticky"></i> Musings</a>
        <a href="mailto:2426815661@qq.com" data-href="email"><i class="fa-regular fa-envelope"></i> Email</a>
      </div>
    </div>
    <div class="footer-bottom">
      <p>Copyright <span data-current-year></span> <span data-profile="name">恍如昨日</span>. All rights reserved.</p>
      <button class="back-to-top" type="button" data-back-to-top aria-label="Back to top">
        <i class="fa-solid fa-arrow-up"></i>
      </button>
    </div>
  </footer>

  <script src="./js/particles.js"></script>
  <script src="./js/animation.js"></script>
  <script src="./js/site-data.js"></script>
  <script src="./js/main.js"></script>
